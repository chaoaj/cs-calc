<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CS Calc</title>

    <link rel="stylesheet" type="text/css" href="style.css">
  </head>

  <body>
    <main class="app">
      <div class="calculator" role="application" aria-label="Calculator">
        <div class="display" id="display">
          <div class="history" id="history" aria-live="polite" aria-atomic="false"></div>
          <div class="buffer" id="buffer"></div>
          <div class="current" id="current">0</div>
        </div>

        <div class="keys" id="keys">
          <div class="pad">
            <!-- top control row: sign and parentheses -->
            <button class="key action" data-action="sign">+/-</button>
            <button class="key action" data-action="paren-l">(</button>
            <button class="key action" data-action="paren-r">)</button>

            <!-- function row: log, e^x, n√ -->
            <button class="key action" data-action="log">log_n</button>
            <button class="key action" data-action="exp">e<sup>x</sup></button>
            <button class="key action" data-action="nrt">n√</button>

            <!-- extra operators row -->
            <button class="key action" data-action="mod">%</button>
            <button class="key action" data-action="intdiv">//</button>
            <button class="key action" data-action="power">x^y</button>

            <button class="key digit" data-digit="7">7</button>
            <button class="key digit" data-digit="8">8</button>
            <button class="key digit" data-digit="9">9</button>

            <button class="key digit" data-digit="4">4</button>
            <button class="key digit" data-digit="5">5</button>
            <button class="key digit" data-digit="6">6</button>

            <button class="key digit" data-digit="1">1</button>
            <button class="key digit" data-digit="2">2</button>
            <button class="key digit" data-digit="3">3</button>

            <button class="key digit wide" data-digit="0">0</button>
            <button class="key digit" data-digit=".">.</button>
          </div>

          <div class="ops">
            <button class="key action" data-action="clear">C</button>
            <button class="key action" data-action="back">⌫</button>
            <button class="key action" data-action="divide">÷</button>
            <button class="key action" data-action="multiply">×</button>
            <button class="key action" data-action="subtract">−</button>
            <button class="key action" data-action="add">+</button>
            <button class="key action equals" data-action="equals">=</button>
          </div>
        </div>
      </div>
    </main>

    <script src="sketch.js" defer></script>
  </body>
</html>
